name: Telegram Notifications
on:
  push:
    branches: [ dev ]
  # pull_request 부분 제거됨
jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: Get commit details
        id: commit-details
        run: |
          # 푸시된 커밋 범위 찾기
          BEFORE_SHA="${{ github.event.before }}"
          AFTER_SHA="${{ github.event.after }}"
          
          # 최대 5개의 커밋 메시지 가져오기 (마크다운 포맷으로)
          COMMIT_LIST=$(git log -n 5 --pretty=format:"- %s" ${BEFORE_SHA}..${AFTER_SHA})
          TOTAL_COMMITS=$(git rev-list --count ${BEFORE_SHA}..${AFTER_SHA})
          
          # PR 병합인지 일반 푸시인지 확인
          if grep -q "Merge pull request" <<< "$(git log -1 --pretty=%s ${AFTER_SHA})"; then
            EVENT_TYPE="병합됨"
          else
            EVENT_TYPE="푸시됨"
          fi
          
          echo "author=$(git log -1 --pretty=%an)" >> $GITHUB_OUTPUT
          echo "event_type=$EVENT_TYPE" >> $GITHUB_OUTPUT
          echo "url=${{ github.event.head_commit.url }}" >> $GITHUB_OUTPUT
          echo "total_commits=$TOTAL_COMMITS" >> $GITHUB_OUTPUT
          
          # 멀티라인 출력을 위한 특수 구문
          echo "message<<EOF" >> $GITHUB_OUTPUT
          echo "$COMMIT_LIST" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      - name: Send Telegram notification
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          format: markdown
          message: |
            🔔 *${{ github.repository }}* 레포지토리 알림
            
            👤 사용자: *${{ steps.commit-details.outputs.author }}*
            📝 이벤트: *${{ steps.commit-details.outputs.event_type }}*
            
            📋 커밋 목록:
            ${{ steps.commit-details.outputs.message }}
            
            🔗 [상세 정보 보기](${{ steps.commit-details.outputs.url }})